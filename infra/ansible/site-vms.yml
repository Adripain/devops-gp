---
- name: Configure Linux node and deploy Task Manager
  hosts: linux
  become: true

  tasks:
    - name: Install Linux packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - git
          - docker.io
          - docker-compose-plugin
          - python3
        state: present
        update_cache: true

    - name: Start Docker
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Add vagrant user to docker group
      ansible.builtin.user:
        name: vagrant
        groups: docker
        append: true

    - name: Validate Docker Compose stack
      ansible.builtin.command:
        cmd: docker compose config
        chdir: /workspace/devops-gp
      changed_when: false

    - name: Deploy Docker Compose stack
      ansible.builtin.command:
        cmd: docker compose up -d --build
        chdir: /workspace/devops-gp
      changed_when: true

    - name: Show Linux demo URLs
      ansible.builtin.debug:
        msg:
          - "Frontend on Linux VM: http://192.168.56.10:8080"
          - "Nginx load balancer/API on Linux VM: http://192.168.56.10:3000"
          - "Prometheus on Linux VM: http://192.168.56.10:9090"
          - "Grafana on Linux VM: http://192.168.56.10:3001"

- name: Configure Windows node
  hosts: windows
  gather_facts: false

  tasks:
    - name: Check WinRM connectivity
      ansible.windows.win_ping:

    - name: Enable IIS
      ansible.windows.win_shell: |
        if (Get-Command Install-WindowsFeature -ErrorAction SilentlyContinue) {
          Install-WindowsFeature -Name Web-Server
        } else {
          Enable-WindowsOptionalFeature -Online -FeatureName IIS-WebServerRole -All -NoRestart
        }

    - name: Create Windows status page
      ansible.windows.win_copy:
        dest: C:\inetpub\wwwroot\index.html
        content: |
          <html>
            <body>
              <h1>Windows node managed by Ansible</h1>
              <p>This VM is part of the DevOps practical work.</p>
              <p>The Linux VM runs the Docker Compose stack with the Nginx load balancer.</p>
            </body>
          </html>

    - name: Show Windows demo URL
      ansible.builtin.debug:
        msg: "Windows IIS page: http://192.168.56.20"

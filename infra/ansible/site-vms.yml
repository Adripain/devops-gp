---
- name: Configure Linux node and deploy Task Manager
  hosts: linux
  become: true
  vars_files:
    - ../virtualbox/config.json

  tasks:
    - name: Install Linux packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - git
          - docker.io
          - docker-compose-plugin
          - python3
        state: present
        update_cache: true

    - name: Start Docker
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Add VM SSH user to docker group
      ansible.builtin.user:
        name: "{{ virtualbox.linux.ssh_user }}"
        groups: docker
        append: true

    - name: Validate Docker Compose stack
      ansible.builtin.command:
        cmd: docker compose config
        chdir: "{{ virtualbox.linux.docker_compose_project_dir }}"
      changed_when: false

    - name: Deploy Docker Compose stack
      ansible.builtin.command:
        cmd: docker compose up -d --build
        chdir: "{{ virtualbox.linux.docker_compose_project_dir }}"
      changed_when: true

    - name: Show Linux demo URLs
      ansible.builtin.debug:
        msg:
          - "Frontend on Linux VM: http://{{ virtualbox.linux.ip }}:{{ virtualbox.ports.frontend }}"
          - "Nginx load balancer/API on Linux VM: http://{{ virtualbox.linux.ip }}:{{ virtualbox.ports.api }}"
          - "Prometheus on Linux VM: http://{{ virtualbox.linux.ip }}:{{ virtualbox.ports.prometheus }}"
          - "Grafana on Linux VM: http://{{ virtualbox.linux.ip }}:{{ virtualbox.ports.grafana }}"

- name: Configure Windows node
  hosts: windows
  gather_facts: false
  vars_files:
    - ../virtualbox/config.json

  tasks:
    - name: Check WinRM connectivity
      ansible.windows.win_ping:

    - name: Enable IIS
      ansible.windows.win_shell: |
        if (Get-Command Install-WindowsFeature -ErrorAction SilentlyContinue) {
          Install-WindowsFeature -Name Web-Server
        } else {
          Enable-WindowsOptionalFeature -Online -FeatureName IIS-WebServerRole -All -NoRestart
        }

    - name: Create Windows status page
      ansible.windows.win_copy:
        dest: "{{ virtualbox.windows.iis_index_path }}"
        content: |
          <html>
            <body>
              <h1>Windows node managed by Ansible</h1>
              <p>This VM is part of the DevOps practical work.</p>
              <p>The Linux VM runs the Docker Compose stack with the Nginx load balancer.</p>
            </body>
          </html>

    - name: Show Windows demo URL
      ansible.builtin.debug:
        msg: "Windows IIS page: http://{{ virtualbox.windows.ip }}"
